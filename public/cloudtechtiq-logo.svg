<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CloudTechtiq multi-tenant cloud platform">
  <defs>
    <linearGradient id="ctbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141426"/>
      <stop offset="1" stop-color="#05060d"/>
    </linearGradient>
    <radialGradient id="ctglow" cx="0.5" cy="0.36" r="0.5">
      <stop offset="0" stop-color="#01BAFE" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#01BAFE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ctcyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#42CAFC"/>
      <stop offset="1" stop-color="#01BAFE"/>
    </linearGradient>
    <radialGradient id="ctsheen" cx="0.28" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#ctbg)"/>
  <circle cx="256" cy="200" r="185" fill="url(#ctglow)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#ctsheen)"/>
  <rect x="17" y="17" width="478" height="478" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- cloud -->
  <g fill="url(#ctcyan)">
    <rect x="190" y="166" width="132" height="40" rx="20"/>
    <circle cx="226" cy="174" r="27"/>
    <circle cx="258" cy="148" r="39"/>
    <circle cx="298" cy="172" r="29"/>
  </g>

  <!-- connectors: one cloud branching to three nodes -->
  <g fill="none" stroke="#01BAFE" stroke-width="8" stroke-linecap="round">
    <path d="M256 208 V248"/>
    <path d="M150 248 H362"/>
    <path d="M150 248 V286"/>
    <path d="M256 248 V286"/>
    <path d="M362 248 V286"/>
  </g>

  <!-- server / tenant nodes -->
  <g fill="url(#ctcyan)">
    <rect x="110" y="286" width="80" height="58" rx="13"/>
    <rect x="216" y="286" width="80" height="58" rx="13"/>
    <rect x="322" y="286" width="80" height="58" rx="13"/>
  </g>
  <!-- status lights (purple accent) -->
  <g fill="#9B5CFF">
    <circle cx="130" cy="315" r="7"/>
    <circle cx="236" cy="315" r="7"/>
    <circle cx="342" cy="315" r="7"/>
  </g>
</svg>
