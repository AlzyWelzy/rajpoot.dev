name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimal default token scope; only what the jobs actually need.
permissions:
  contents: read

# Supersede in-progress runs for the same branch/PR so pushes don't queue
# three heavy jobs against stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm-workspace.yaml is gitignored (Vercel's pnpm 9 rejects a
      # settings-only workspace file), so recreate the build-script
      # approvals pnpm 11 requires before installing.
      - name: Allow native build scripts
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          allowBuilds:
            sharp: true
            unrs-resolver: true
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Allow native build scripts
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          allowBuilds:
            sharp: true
            unrs-resolver: true
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Allow native build scripts
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          allowBuilds:
            sharp: true
            unrs-resolver: true
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun
