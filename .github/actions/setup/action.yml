name: Setup pnpm and install
description: >
  Set up pnpm + Node (with store caching), recreate the gitignored
  pnpm-workspace.yaml build-script approvals, and install dependencies.
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 22
        cache: pnpm

    # pnpm-workspace.yaml is gitignored (Vercel's pnpm 9 rejects a
    # settings-only workspace file), so recreate the build-script approvals
    # pnpm 11 requires before installing.
    - name: Allow native build scripts
      shell: bash
      run: |
        cat > pnpm-workspace.yaml <<'EOF'
        allowBuilds:
          sharp: true
          unrs-resolver: true
        EOF

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
