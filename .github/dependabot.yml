# Weekly dependency updates. npm minor/patch bumps arrive as one grouped PR to
# keep noise down; majors and GitHub Actions (SHA-pinned in ci.yml) come
# individually.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
